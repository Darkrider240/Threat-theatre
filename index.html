<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Protocol: Threat Theatre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#0f1117',
                        surface: '#1a1d27',
                        surfaceRaised: '#222536',
                        borderCustom: '#2a2d3e',
                        accentBlue: '#4f8ef7',
                        accentGreen: '#22c55e',
                        accentRed: '#ef4444',
                        accentOrange: '#f97316',
                        accentYellow: '#eab308',
                        textPrimary: '#f1f5f9',
                        textSecondary: '#94a3b8',
                        textMuted: '#475569',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(4px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: {
                        fadeIn: 'fadeIn 0.3s ease-out forwards',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-bgDark text-textPrimary font-sans antialiased overflow-hidden select-none">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [scenarios, setScenarios] = React.useState([]);
            const [scenariosLoading, setScenariosLoading] = React.useState(true);
            const [threatFeed, setThreatFeed] = React.useState(null);
            const [intelLoading, setIntelLoading] = React.useState(true);
            const [currentTime, setCurrentTime] = React.useState(new Date());

            React.useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const fetchScenarios = () => {
                setScenariosLoading(true);
                fetch("http://localhost:8000/api/scenarios")
                    .then(res => res.json())
                    .then(data => {
                        setScenarios(data);
                        setScenariosLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setScenariosLoading(false);
                    });
            };

            const fetchThreatFeed = () => {
                setIntelLoading(true);
                fetch("http://localhost:8000/api/threat-feed")
                    .then(res => res.json())
                    .then(data => {
                        setThreatFeed(data);
                        setIntelLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setIntelLoading(false);
                    });
            };

            React.useEffect(() => {
                fetchScenarios();
                fetchThreatFeed();
            }, []);

            const handleCardClick = (assetType) => {
                sessionStorage.setItem("selected_asset_type", assetType);
                window.location.href = "theatre.html";
            };

            const formatUTC = (date) => {
                const day = String(date.getUTCDate()).padStart(2, '0');
                const months = ["JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC", "JAN", "FEB", "MAR", "APR", "MAY"];
                const month = date.getUTCMonth() === 5 ? "JUN" : date.toLocaleDateString('en-US', { month: 'short', timeZone: 'UTC' }).toUpperCase();
                const year = date.getUTCFullYear();
                const hours = String(date.getUTCHours()).padStart(2, '0');
                const minutes = String(date.getUTCMinutes()).padStart(2, '0');
                const seconds = String(date.getUTCSeconds()).padStart(2, '0');
                return `${day} ${month} ${year} // ${hours}:${minutes}:${seconds} UTC`;
            };

            const getThreatBadgeClass = (level) => {
                if (level === "CRITICAL") return "text-accentRed border-accentRed/30 bg-accentRed/10";
                if (level === "HIGH") return "text-accentOrange border-accentOrange/30 bg-accentOrange/10";
                return "text-accentGreen border-accentGreen/30 bg-accentGreen/10";
            };

            const getCvssBadgeClass = (score) => {
                if (score >= 9.0) return "text-accentRed border-accentRed/30 bg-accentRed/10";
                if (score >= 7.0) return "text-accentOrange border-accentOrange/30 bg-accentOrange/10";
                return "text-accentYellow border-accentYellow/30 bg-accentYellow/10";
            };

            return (
                <div className="h-screen flex flex-col justify-between">
                    {/* TOP NAV BAR */}
                    <nav className="h-12 bg-surface border-b border-borderCustom flex items-center justify-between px-4 z-50">
                        <div className="flex items-center gap-3">
                            <svg className="w-4.5 h-4.5 text-accentBlue" viewBox="0 0 20 20" fill="currentColor">
                                <path fillRule="evenodd" d="M2.166 4.9L10 1.15l7.834 3.75a2 2 0 011.166 1.8v3.424a13.9 13.9 0 01-5.748 11.238L10 19l-3.252-1.638A13.9 13.9 0 011 10.124V6.7a2 2 0 011.166-1.8zM10 3.12L3.5 6.24v3.884c0 4.14 2.215 7.973 5.753 9.876L10 20.4l.747-.4c3.538-1.903 5.753-5.736 5.753-9.876V6.24L10 3.12z" clipRule="evenodd" />
                            </svg>
                            <span className="text-sm font-bold text-white tracking-widest">GHOST PROTOCOL</span>
                            <div className="w-[1px] h-4 bg-borderCustom"></div>
                            <span className="text-xs text-textSecondary font-semibold tracking-wider">THREAT THEATRE</span>
                        </div>

                        <div className="hidden md:flex items-center gap-3 text-[10px] font-mono">
                            <div className="px-2.5 py-1 bg-accentRed/5 border border-accentRed/20 text-accentRed rounded">
                                <span className="animate-pulse mr-1">●</span> CRITICAL CVES TODAY: {threatFeed ? threatFeed.total_critical : "..."}
                            </div>
                            <div className="px-2.5 py-1 bg-accentGreen/5 border border-accentGreen/20 text-accentGreen rounded">
                                <span className="animate-pulse mr-1">●</span> SYSTEM STATUS: ACTIVE
                            </div>
                            <div className="px-2.5 py-1 bg-accentBlue/5 border border-accentBlue/20 text-accentBlue rounded">
                                <span className="mr-1">●</span> INTEL SOURCE: NVD + MITRE
                            </div>
                        </div>

                        <div className="text-xs font-mono text-textSecondary font-medium tracking-wider">
                            {formatUTC(currentTime)}
                        </div>
                    </nav>

                    {/* MAIN TWO COLUMN LAYOUT */}
                    <div className="flex-grow flex h-[calc(100vh-48px-32px)] overflow-hidden">
                        {/* LEFT COLUMN: Mission Select */}
                        <main className="w-3/5 border-r border-borderCustom p-6 overflow-y-auto flex flex-col justify-between">
                            <div>
                                <div className="pb-2 border-b border-borderCustom mb-6 flex justify-between items-center">
                                    <span className="text-[10px] font-bold text-textMuted tracking-widest uppercase">ACTIVE THREAT SCENARIOS</span>
                                    <span className="text-[10px] font-mono text-textMuted">SCENARIOS REPORTED: {scenarios.length}</span>
                                </div>

                                {scenariosLoading ? (
                                    <div className="grid grid-cols-2 gap-4">
                                        {[1, 2, 3].map(n => (
                                            <div key={n} className="bg-surface border border-borderCustom rounded p-5 h-44 animate-pulse flex flex-col justify-between">
                                                <div className="flex justify-between items-center">
                                                    <div className="w-16 h-4 bg-borderCustom rounded"></div>
                                                    <div className="w-6 h-6 bg-borderCustom rounded-full"></div>
                                                </div>
                                                <div className="w-3/4 h-5 bg-borderCustom rounded my-2"></div>
                                                <div className="w-full h-10 bg-borderCustom rounded"></div>
                                                <div className="flex gap-2">
                                                    <div className="w-12 h-4 bg-borderCustom rounded"></div>
                                                    <div className="w-20 h-4 bg-borderCustom rounded"></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 gap-4">
                                        {scenarios.map(scenario => (
                                            <div 
                                                key={scenario.asset_type}
                                                onClick={() => handleCardClick(scenario.asset_type)}
                                                className="bg-surface border border-borderCustom hover:border-accentBlue hover:bg-surfaceRaised p-5 rounded cursor-pointer transition-all duration-150 flex flex-col justify-between h-44 group"
                                            >
                                                <div className="flex justify-between items-center">
                                                    <span className={`text-[9px] font-bold px-2 py-0.5 border rounded tracking-wider ${getThreatBadgeClass(scenario.threat_level)}`}>
                                                        {scenario.threat_level}
                                                    </span>
                                                    <span className="text-lg">{scenario.icon}</span>
                                                </div>
                                                <div>
                                                    <h3 className="text-sm font-semibold text-white group-hover:text-accentBlue transition-colors duration-150 line-clamp-1">
                                                        {scenario.display_name}
                                                    </h3>
                                                    <p className="text-xs text-textSecondary line-clamp-2 mt-1 leading-relaxed">
                                                        {scenario.description}
                                                    </p>
                                                </div>
                                                <div className="flex gap-2 font-mono text-[9px] text-textMuted uppercase">
                                                    <span className="px-1.5 py-0.5 bg-bgDark border border-borderCustom rounded">TTPs: 2</span>
                                                    <span className="px-1.5 py-0.5 bg-bgDark border border-borderCustom rounded">MITRE: ATT&CK</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </main>

                        {/* RIGHT COLUMN: Live Threat Intelligence Feed */}
                        <aside className="w-2/5 p-6 overflow-hidden flex flex-col justify-between">
                            <div className="flex flex-col h-[calc(100%-48px)]">
                                <div className="pb-2 border-b border-borderCustom mb-4 flex justify-between items-center">
                                    <span className="text-[10px] font-bold text-textMuted tracking-widest uppercase">LIVE CVE INTELLIGENCE</span>
                                    {threatFeed && (
                                        <span className="text-[9px] font-mono text-textMuted">
                                            UPDATED: {threatFeed.last_updated.slice(11, 19)} UTC
                                        </span>
                                    )}
                                </div>

                                <div className="flex-grow overflow-y-auto pr-1">
                                    {intelLoading ? (
                                        <div className="flex flex-col gap-4 py-8 items-center justify-center">
                                            <div className="w-6 h-6 border-2 border-accentBlue border-t-transparent rounded-full animate-spin"></div>
                                            <span className="text-[10px] text-textSecondary uppercase tracking-widest">Polling NVD database...</span>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col">
                                            {threatFeed && threatFeed.cves.map((cve, index) => (
                                                <div 
                                                    key={cve.cve_id} 
                                                    className="py-3 border-b border-borderCustom/60 flex items-start gap-4 animate-fadeIn opacity-0"
                                                    style={{ animationDelay: `${index * 100}ms` }}
                                                >
                                                    <span className={`font-mono font-bold text-[10px] px-2 py-1 border rounded w-11 text-center shrink-0 ${getCvssBadgeClass(cve.cvss_score)}`}>
                                                        {cve.cvss_score.toFixed(1)}
                                                    </span>
                                                    <div className="flex-grow">
                                                        <a 
                                                            href={cve.url} 
                                                            target="_blank" 
                                                            rel="noopener noreferrer" 
                                                            className="font-mono text-xs text-accentBlue hover:underline font-bold"
                                                        >
                                                            {cve.cve_id}
                                                        </a>
                                                        <p className="text-xs text-textSecondary leading-normal mt-0.5 pr-2">
                                                            {cve.description}
                                                        </p>
                                                    </div>
                                                    <span className="font-mono text-[9px] text-textMuted shrink-0">
                                                        {cve.published}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <button 
                                onClick={fetchThreatFeed}
                                className="w-full h-9 border border-borderCustom hover:border-accentBlue text-textSecondary hover:text-accentBlue text-xs uppercase tracking-widest font-bold font-mono transition-colors duration-150 flex items-center justify-center gap-2 rounded bg-surface/50"
                            >
                                <svg className={`w-3.5 h-3.5 ${intelLoading ? 'animate-spin' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3-3 3 3m-3-3v12" />
                                </svg>
                                Refresh Intel
                            </button>
                        </aside>
                    </div>

                    {/* FOOTER */}
                    <footer className="h-8 bg-surface border-t border-borderCustom flex items-center justify-between px-4 z-50">
                        <span className="text-[9px] text-textMuted font-mono uppercase tracking-wider">
                            POWERED BY GHOST PROTOCOL AI // FOUNDRY IQ INTELLIGENCE LAYER
                        </span>
                        <span className="text-[9px] text-textMuted font-mono uppercase tracking-wider">
                            GITHUB COPILOT ASSISTED BUILD
                        </span>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
