<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Protocol - Threat Theatre</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0d1117',
                        surface: '#161b22',
                        'surface-raised': '#1c2128',
                        border: '#30363d',
                        accent: '#388bfd',
                        success: '#3fb950',
                        warning: '#d29922',
                        danger: '#f85149',
                        'text-primary': '#e6edf3',
                        'text-secondary': '#8b949e',
                        'text-muted': '#484f58',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Prevent body scroll, layout handles it */
        }
        
        @keyframes fadeInRow {
            from { opacity: 0; transform: translateX(-4px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .animate-fade-in-row {
            animation: fadeInRow 0.2s ease-out forwards;
            opacity: 0;
        }

        /* Custom scrollbar for clinical feel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117; 
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d; 
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #484f58; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 1. Redirect if no environment found
        const envRaw = localStorage.getItem('gp_environment');
        if (!envRaw) {
            window.location.href = 'onboarding.html';
        }
        
        let env;
        try {
            env = JSON.parse(envRaw);
            if (!env || !env.org_name) {
                throw new Error("Invalid env");
            }
        } catch(e) {
            window.location.href = 'onboarding.html';
        }

        const API_BASE = window.location.protocol === 'file:' || (window.location.port && window.location.port !== '8000')
            ? 'http://localhost:8000'
            : '';

        const App = () => {
            const [scenarios, setScenarios] = React.useState([]);
            const [threatFeed, setThreatFeed] = React.useState({ cves: [], total_critical: 0, last_updated: '' });
            const [time, setTime] = React.useState('');
            const [isRefreshing, setIsRefreshing] = React.useState(false);
            const [riskProfile, setRiskProfile] = React.useState(null);

            React.useEffect(() => {
                const profileRaw = localStorage.getItem('gp_risk_profile');
                if (profileRaw) {
                    try {
                        setRiskProfile(JSON.parse(profileRaw));
                    } catch (e) {
                        setRiskProfile(null);
                    }
                } else {
                    setRiskProfile(null);
                }
            }, []);

            React.useEffect(() => {
                const updateClock = () => {
                    const now = new Date();
                    setTime(now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC');
                };
                updateClock();
                const timer = setInterval(updateClock, 1000);
                return () => clearInterval(timer);
            }, []);

            const fetchIntel = () => {
                Promise.all([
                    fetch(API_BASE + '/api/scenarios').then(r => r.json()),
                    fetch(API_BASE + '/api/threat-feed').then(r => r.json())
                ]).then(([scenariosData, threatData]) => {
                    setScenarios(scenariosData);
                    setThreatFeed(threatData);
                }).catch(err => {
                    console.error('Failed to fetch data', err);
                });
            };

            React.useEffect(() => {
                fetchIntel();
            }, []);

            const handleRefresh = () => {
                setIsRefreshing(true);
                fetch(API_BASE + '/api/threat-feed').then(r => r.json()).then(data => {
                    setThreatFeed(data);
                    setIsRefreshing(false);
                }).catch(err => {
                    console.error('Failed to fetch threat feed', err);
                    setIsRefreshing(false);
                });
            };

            const handleScenarioClick = (scenario) => {
                sessionStorage.setItem('gp_selected_scenario', JSON.stringify({
                    asset_type: scenario.asset_type,
                    display_name: scenario.display_name
                }));
                window.location.href = 'theatre.html';
            };

            const getThreatBadgeClasses = (level) => {
                if (level === 'CRITICAL') return 'bg-danger/10 text-danger border border-danger/20';
                if (level === 'HIGH') return 'bg-warning/10 text-warning border border-warning/20';
                if (level === 'MEDIUM') return 'bg-success/10 text-success border border-success/20';
                return 'bg-surface-raised text-text-secondary border border-border';
            };

            const getCvssBadgeClasses = (score) => {
                if (score >= 9.0) return 'bg-danger/10 text-danger border border-danger/30';
                if (score >= 7.0) return 'bg-warning/10 text-warning border border-warning/30';
                return 'bg-surface-raised text-text-secondary border border-border';
            };

            const formatAssets = (assets) => {
                if (!assets || !assets.length) return "NO KEY ASSETS DEFINED";
                const displayAssets = assets.slice(0, 3);
                let text = displayAssets.join(' · ');
                if (assets.length > 3) text += ` · +${assets.length - 3} MORE`;
                return text.toUpperCase();
            };

            const formatDateStr = (isoString) => {
                if (!isoString) return '--';
                // try to return just the YYYY-MM-DD or the string if it's already short
                return isoString.split('T')[0];
            };

            return (
                <div className="h-screen w-full flex flex-col font-sans bg-background text-text-primary">
                    
                    {/* TOP NAV BAR */}
                    <div className="flex-none h-12 w-full bg-surface border-b border-border flex items-center justify-between px-4 z-50">
                        {/* Left */}
                        <div className="flex items-center space-x-3">
                            <svg className="w-4 h-4 text-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </svg>
                            <span className="text-[13px] font-semibold text-text-primary tracking-wide">GHOST PROTOCOL</span>
                            <div className="h-4 w-px bg-border"></div>
                            <span className="text-[12px] text-text-secondary tracking-wide">THREAT THEATRE</span>
                        </div>
                        
                        {/* Center */}
                        <div className="flex items-center space-x-3">
                            <div className="border border-danger text-danger rounded-full px-[10px] py-[2px] text-[11px] font-mono whitespace-nowrap">
                                ● {threatFeed.total_critical || 0} CRITICAL CVEs
                            </div>
                            <div className="border border-success text-success rounded-full px-[10px] py-[2px] text-[11px] font-mono whitespace-nowrap">
                                ● SYSTEM ACTIVE
                            </div>
                            <div className="border border-accent text-accent rounded-full px-[10px] py-[2px] text-[11px] font-mono whitespace-nowrap">
                                ● NVD + MITRE INTELLIGENCE
                            </div>
                        </div>

                        {/* Right */}
                        <div className="flex items-center space-x-3">
                            <span className="text-[12px] text-text-secondary tracking-wide">{env.org_name || 'UNKNOWN ORG'}</span>
                            <div className="h-4 w-px bg-border"></div>
                            <span className="text-[11px] font-mono text-text-muted">{time}</span>
                            <button 
                                onClick={() => window.location.href = 'onboarding.html'}
                                className="text-text-muted hover:text-text-primary transition-colors cursor-pointer ml-2"
                                title="Settings"
                            >
                                ⚙
                            </button>
                        </div>
                    </div>

                    {/* RISK PROFILE BANNER */}
                    {riskProfile && (
                        <div className="flex-none w-full bg-surface border-b border-border py-2.5 px-6 flex items-center justify-between z-40">
                            {/* Left side */}
                            <div className="flex items-center space-x-3">
                                <div className="text-[14px] font-mono font-bold">
                                    <span className={
                                        riskProfile.risk_level === 'CRITICAL' ? 'text-danger' :
                                        riskProfile.risk_level === 'HIGH' ? 'text-warning' :
                                        riskProfile.risk_level === 'MEDIUM' ? 'text-success' : 'text-accent'
                                    }>
                                        {riskProfile.risk_score}
                                    </span>
                                    <span className="text-text-muted">/100</span>
                                </div>
                                <div className="h-4 w-px bg-border"></div>
                                <div className={`text-[11px] font-mono rounded-sm px-2 py-0.5 border ${
                                    riskProfile.risk_level === 'CRITICAL' ? 'border-danger text-danger' :
                                    riskProfile.risk_level === 'HIGH' ? 'border-warning text-warning' :
                                    riskProfile.risk_level === 'MEDIUM' ? 'border-success text-success' : 'border-accent text-accent'
                                }`}>
                                    {riskProfile.risk_level}
                                </div>
                                <div className="h-4 w-px bg-border"></div>
                                <div className="text-[12px] text-text-secondary truncate max-w-[500px]" title={riskProfile.summary}>
                                    {riskProfile.summary}
                                </div>
                            </div>
                            {/* Right side */}
                            <div className="flex items-center space-x-3">
                                <span className="text-[10px] text-text-muted font-semibold uppercase tracking-wider">TOP THREATS:</span>
                                <div className="flex items-center space-x-2">
                                    {(riskProfile.top_threats || []).slice(0, 3).map((threat, idx) => (
                                        <span key={idx} className="border border-border text-text-muted px-2 py-0.5 rounded-sm text-[10px] font-mono max-w-[150px] truncate" title={threat}>
                                            {threat}
                                        </span>
                                    ))}
                                </div>
                                <div className="h-4 w-px bg-border"></div>
                                <button 
                                    onClick={() => window.location.href = 'onboarding.html'}
                                    className="text-[10px] text-text-muted hover:text-text-primary font-mono tracking-wider cursor-pointer"
                                >
                                    RECONFIGURE ⚙
                                </button>
                            </div>
                        </div>
                    )}

                    {/* MAIN LAYOUT */}
                    <div className="flex-1 flex overflow-hidden">
                        
                        {/* LEFT COLUMN */}
                        <div className="w-[58%] h-full p-6 flex flex-col overflow-y-auto">
                            {/* Header row */}
                            <div className="flex justify-between items-end mb-3">
                                <h2 className="text-[11px] uppercase tracking-[0.15em] text-text-muted font-semibold">Active Threat Scenarios</h2>
                                <div className="text-[11px] font-mono text-text-muted">
                                    ENVIRONMENT: {env.cloud_provider || 'UNKNOWN'} // {env.industry || 'UNKNOWN'}
                                </div>
                            </div>
                            <hr className="border-border mb-6" />

                            {/* 2x2 Grid */}
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                {scenarios.map((s, idx) => {
                                    const isRecommended = riskProfile && riskProfile.recommended_scenario === s.asset_type;
                                    return (
                                        <div 
                                            key={idx}
                                            onClick={() => handleScenarioClick(s)}
                                            className={`bg-surface border ${isRecommended ? 'border-accent' : 'border-border'} rounded-md overflow-hidden cursor-pointer transition-all duration-150 hover:border-accent hover:bg-surface-raised group flex flex-col`}
                                        >
                                            {isRecommended && (
                                                <div className="w-full bg-accent text-white font-semibold text-[10px] font-sans text-center py-1 flex items-center justify-center tracking-wide uppercase">
                                                    ★ RECOMMENDED FOR YOUR STACK
                                                </div>
                                            )}
                                            <div className="p-4 flex-1 flex flex-col">
                                                {isRecommended && riskProfile.recommendation_reason && (
                                                    <p className="text-[11px] text-text-muted italic mb-3">
                                                        {riskProfile.recommendation_reason}
                                                    </p>
                                                )}
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold tracking-wider ${getThreatBadgeClasses(s.threat_level)}`}>
                                                        {s.threat_level}
                                                    </span>
                                                    <span className="text-lg opacity-80 group-hover:opacity-100">{s.icon}</span>
                                                </div>
                                                <h3 className="text-[15px] font-semibold text-text-primary mb-2">{s.display_name}</h3>
                                                <p className="text-[13px] text-text-secondary line-clamp-2 mb-4 flex-1 leading-relaxed">
                                                    {s.description}
                                                </p>
                                                <div className="flex space-x-2 mt-auto pt-2">
                                                    <span className="border border-border rounded px-1.5 py-0.5 text-[11px] font-mono text-text-muted">TTPs: 2</span>
                                                    <span className="border border-border rounded px-1.5 py-0.5 text-[11px] font-mono text-text-muted">MITRE ATT&amp;CK</span>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Assets Row */}
                            <div className="text-[11px] font-mono text-text-muted tracking-wide">
                                TARGETING: {formatAssets(env.key_assets)}
                            </div>
                        </div>

                        {/* RIGHT COLUMN */}
                        <div className="w-[42%] h-full border-l border-border p-6 flex flex-col overflow-y-auto">
                            <div className="flex justify-between items-end mb-3">
                                <h2 className="text-[11px] uppercase tracking-[0.15em] text-text-muted font-semibold">Live CVE Intelligence</h2>
                                <div className="text-[11px] font-mono text-text-muted">
                                    {threatFeed.last_updated ? formatDateStr(threatFeed.last_updated) : '--'}
                                </div>
                            </div>
                            <hr className="border-border mb-2" />

                            {/* CVE List */}
                            <div className="flex-1 overflow-y-auto pr-2 mb-4 space-y-0">
                                {threatFeed.cves && threatFeed.cves.length > 0 ? (
                                    threatFeed.cves.map((cve, idx) => (
                                        <div 
                                            key={cve.cve_id || idx} 
                                            className="flex items-start py-3 border-b border-border animate-fade-in-row"
                                            style={{ animationDelay: `${idx * 80}ms` }}
                                        >
                                            <div className="flex-shrink-0 mr-3 mt-0.5">
                                                <span className={`inline-block px-1.5 py-0.5 rounded text-[12px] font-mono font-bold ${getCvssBadgeClasses(cve.cvss_score)}`}>
                                                    {cve.cvss_score.toFixed(1)}
                                                </span>
                                            </div>
                                            <div className="flex-1 min-w-0 pr-3">
                                                <a 
                                                    href={cve.url} 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="text-[12px] font-mono text-accent hover:text-accent-hover hover:underline truncate block mb-1"
                                                >
                                                    {cve.cve_id}
                                                </a>
                                                <p className="text-[12px] text-text-secondary line-clamp-2 leading-relaxed">
                                                    {cve.description}
                                                </p>
                                            </div>
                                            <div className="flex-shrink-0 text-[11px] font-mono text-text-muted mt-1">
                                                {formatDateStr(cve.published)}
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="py-8 text-center text-[12px] text-text-muted font-mono">
                                        No critical CVEs retrieved or still loading...
                                    </div>
                                )}
                            </div>

                            {/* Controls */}
                            <div className="mt-auto pt-2 border-t border-border/50 flex flex-col items-center">
                                <button 
                                    onClick={handleRefresh}
                                    disabled={isRefreshing}
                                    className="w-full bg-transparent border border-border hover:border-text-secondary text-text-secondary text-[11px] font-mono py-2 rounded transition-colors disabled:opacity-50 disabled:cursor-not-allowed mb-3"
                                >
                                    {isRefreshing ? "REFRESHING..." : "REFRESH INTEL"}
                                </button>
                                <span className="text-[10px] text-text-muted">
                                    Live data sourced from National Vulnerability Database (NVD)
                                </span>
                            </div>
                        </div>
                    </div>

                    {/* FIXED BOTTOM BAR */}
                    <div className="flex-none h-8 w-full bg-surface border-t border-border flex items-center justify-between px-4 z-50">
                        <div className="font-mono text-[10px] text-text-muted tracking-wide">
                            GHOST PROTOCOL v3.0 // FOUNDRY IQ INTELLIGENCE LAYER
                        </div>
                        <div className="font-mono text-[10px] text-text-muted tracking-wide">
                            GITHUB COPILOT ASSISTED BUILD
                        </div>
                    </div>
                    
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
