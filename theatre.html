<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Protocol: Threat Theatre // Active Deception</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#0f1117',
                        surface: '#1a1d27',
                        surfaceRaised: '#222536',
                        borderCustom: '#2a2d3e',
                        accentBlue: '#4f8ef7',
                        accentGreen: '#22c55e',
                        accentRed: '#ef4444',
                        accentOrange: '#f97316',
                        accentYellow: '#eab308',
                        textPrimary: '#f1f5f9',
                        textSecondary: '#94a3b8',
                        textMuted: '#475569',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-bgDark text-textPrimary font-sans antialiased overflow-hidden select-none">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [brief, setBrief] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);

            const [statusLine1, setStatusLine1] = React.useState(false);
            const [statusLine2, setStatusLine2] = React.useState(false);
            const [statusLine3, setStatusLine3] = React.useState(false);

            const [chatMessages, setChatMessages] = React.useState([
                {
                    role: "assistant",
                    content: "Brief complete. I've identified the threat actor and predicted their next move. What do you need to know?",
                    timestamp: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
                }
            ]);
            const [chatInput, setChatInput] = React.useState("");
            const [chatLoading, setChatLoading] = React.useState(false);
            const chatEndRef = React.useRef(null);

            const assetType = sessionStorage.getItem("selected_asset_type") || "canary_aws_token";

            React.useEffect(() => {
                const t1 = setTimeout(() => setStatusLine1(true), 800);
                const t2 = setTimeout(() => setStatusLine2(true), 1600);
                const t3 = setTimeout(() => setStatusLine3(true), 2400);

                fetch("http://localhost:8000/api/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ asset_type: assetType, source_ip: "198.51.100.42" })
                })
                .then(res => {
                    if (!res.ok) throw new Error("Service unavailable");
                    return res.json();
                })
                .then(data => {
                    setBrief(data);
                    setLoading(false);
                })
                .catch(err => {
                    console.error(err);
                    setError(err.message);
                    setLoading(false);
                });

                return () => {
                    clearTimeout(t1);
                    clearTimeout(t2);
                    clearTimeout(t3);
                };
            }, [assetType]);

            React.useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [chatMessages, chatLoading]);

            const handleSendMessage = (e) => {
                e.preventDefault();
                if (!chatInput.trim() || chatLoading) return;

                const userMsg = {
                    role: "user",
                    content: chatInput,
                    timestamp: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
                };

                const updatedHistory = [...chatMessages, userMsg];
                setChatMessages(updatedHistory);
                setChatInput("");
                setChatLoading(true);

                fetch("http://localhost:8000/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        brief_context: JSON.stringify(brief),
                        messages: updatedHistory.map(m => ({ role: m.role, content: m.content })),
                        new_message: userMsg.content
                    })
                })
                .then(res => res.json())
                .then(data => {
                    setChatMessages(prev => [
                        ...prev,
                        {
                            role: "assistant",
                            content: data.reply,
                            timestamp: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
                        }
                    ]);
                    setChatLoading(false);
                })
                .catch(err => {
                    console.error(err);
                    setChatMessages(prev => [
                        ...prev,
                        {
                            role: "assistant",
                            content: "Ghost Protocol is processing. Stand by.",
                            timestamp: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
                        }
                    ]);
                    setChatLoading(false);
                });
            };

            if (loading || error) {
                return (
                    <div className="h-screen w-screen flex flex-col justify-center items-center bg-bgDark">
                        {error ? (
                            <div className="text-center p-8 max-w-md border border-accentRed/30 bg-accentRed/5 rounded-lg flex flex-col items-center gap-4">
                                <span className="text-4xl">⚠️</span>
                                <h1 className="text-sm font-bold tracking-widest text-white uppercase">ANALYST UPLINK OFFLINE</h1>
                                <p className="text-xs text-textSecondary leading-relaxed">
                                    The active intelligence feed is currently down. Verify that <code className="text-accentRed font-bold font-mono">python app.py</code> is initialized and listening on port 8000.
                                </p>
                                <a 
                                    href="index.html" 
                                    className="mt-2 px-4 py-2 border border-accentBlue text-accentBlue hover:bg-accentBlue hover:text-white font-mono font-bold text-xs uppercase tracking-widest transition-colors duration-150 rounded"
                                >
                                    Return to Terminal
                                </a>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center gap-6">
                                <svg className="w-12 h-12 text-accentBlue animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                </svg>
                                <div className="text-center">
                                    <h2 class="text-xs font-mono font-bold tracking-[0.25em] text-textSecondary uppercase animate-pulse">
                                        GHOST PROTOCOL ANALYZING THREAT
                                    </h2>
                                    <div className="flex flex-col items-start gap-2 mt-6 font-mono text-[11px] text-textMuted max-w-xs mx-auto">
                                        <div className={`flex items-center gap-2 transition-opacity duration-300 ${statusLine1 ? 'opacity-100' : 'opacity-0'}`}>
                                            <span className="text-accentBlue">►</span> Querying MITRE ATT&CK knowledge base...
                                        </div>
                                        <div className={`flex items-center gap-2 transition-opacity duration-300 ${statusLine2 ? 'opacity-100' : 'opacity-0'}`}>
                                            <span className="text-accentBlue">►</span> Cross-referencing active threat indicators...
                                        </div>
                                        <div className={`flex items-center gap-2 transition-opacity duration-300 ${statusLine3 ? 'opacity-100' : 'opacity-0'}`}>
                                            <span className="text-accentBlue">►</span> Generating Predictive Attacker Brief...
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            const getConfidenceColor = (score) => {
                if (score > 0.8) return "text-accentRed";
                if (score > 0.6) return "text-accentOrange";
                return "text-accentGreen";
            };

            const getPriorityClass = (pri) => {
                if (pri === 1) return "text-accentRed border-accentRed/30 bg-accentRed/10";
                if (pri === 2) return "text-accentOrange border-accentOrange/30 bg-accentOrange/10";
                return "text-accentYellow border-accentYellow/30 bg-accentYellow/10";
            };

            const getUrgencyClass = (urg) => {
                if (urg === "Immediate") return "text-accentRed border-accentRed/30 bg-accentRed/10";
                if (urg === "Within 1 hour") return "text-accentOrange border-accentOrange/30 bg-accentOrange/10";
                return "text-accentYellow border-accentYellow/30 bg-accentYellow/10";
            };

            return (
                <div className="h-screen w-screen flex flex-col bg-bgDark overflow-hidden animate-fadeIn opacity-0">
                    {/* TOP BAR */}
                    <header className="h-10 border-b border-borderCustom flex items-center justify-between px-4 z-40 bg-surface/50 select-none">
                        <button 
                            onClick={() => window.location.href = "index.html"}
                            className="flex items-center gap-2 text-xs font-semibold text-textSecondary hover:text-white transition-colors duration-150"
                        >
                            <span>&larr;</span> <span className="font-mono">NEW MISSION</span>
                        </button>
                        <div className="flex items-center gap-3 text-xs">
                            <span className="font-mono text-textMuted">PREDICTIVE ATTACKER BRIEF</span>
                            <div className="w-[1px] h-3 bg-borderCustom"></div>
                            <span className="font-mono text-accentBlue">{brief.event_id}</span>
                        </div>
                        <div class="font-mono text-[10px] text-textMuted">
                            {brief.generated_at.slice(0, 19).replace('T', ' ')} UTC
                        </div>
                    </header>

                    {/* THREE COLUMN LAYOUT */}
                    <div className="flex-grow flex h-[calc(100vh-40px)] overflow-hidden">
                        {/* LEFT COLUMN: Attacker Profile */}
                        <aside className="w-[25%] border-r border-borderCustom p-5 overflow-y-auto flex flex-col gap-4">
                            <div>
                                <span className="text-[10px] font-bold text-textMuted tracking-wider uppercase block mb-3">THREAT ACTOR</span>
                                <div className="bg-surface border border-borderCustom rounded p-5 text-center flex flex-col items-center">
                                    <span className={`text-4xl font-bold font-mono tracking-tight ${getConfidenceColor(brief.attacker_profile.confidence_score)}`}>
                                        {Math.round(brief.attacker_profile.confidence_score * 100)}%
                                    </span>
                                    <span className="text-[9px] font-bold text-textMuted tracking-widest uppercase mt-2">CONFIDENCE SCORE</span>
                                </div>
                            </div>
                            
                            <div className="w-full h-[1px] bg-borderCustom"></div>
                            
                            <div>
                                <span className="text-[9px] text-textMuted font-mono block">SUSPECTED GROUP</span>
                                <h3 className="text-sm font-semibold text-white mt-1 font-mono tracking-wider">{brief.attacker_profile.suspected_group}</h3>
                            </div>

                            <div className="w-full h-[1px] bg-borderCustom"></div>

                            <div className="flex-grow flex flex-col gap-3">
                                <span className="text-[10px] font-bold text-textMuted tracking-wider uppercase">// MITRE ATT&CK TECHNIQUES</span>
                                <div className="flex flex-col gap-3">
                                    {brief.attacker_profile.ttps.map(ttp => (
                                        <div key={ttp.technique_id} className="bg-surface border border-borderCustom p-3.5 rounded flex flex-col gap-2">
                                            <div className="flex justify-between items-start">
                                                <span className="font-mono text-xs font-bold text-accentBlue">{ttp.technique_id}</span>
                                                <span className="text-[9px] font-mono text-textMuted uppercase">{ttp.tactic}</span>
                                            </div>
                                            <span className="text-xs text-white leading-snug font-medium">{ttp.technique_name}</span>
                                            <div className="w-full bg-bgDark h-1 rounded-full overflow-hidden border border-borderCustom/20">
                                                <div className="h-full bg-accentBlue" style={{ width: `${ttp.confidence * 100}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="w-full h-[1px] bg-borderCustom"></div>

                            <div className="bg-surface/30 p-4 rounded border border-borderCustom/40">
                                <p className="text-xs text-textSecondary italic leading-relaxed">
                                    "{brief.summary}"
                                </p>
                            </div>
                        </aside>

                        {/* CENTER COLUMN: Blast Radius & Actions */}
                        <main className="w-[45%] border-r border-borderCustom p-5 overflow-y-auto flex flex-col gap-6">
                            <div>
                                <span className="text-[10px] font-bold text-textMuted tracking-wider uppercase block mb-3">BLAST RADIUS</span>
                                <div className="flex items-center gap-2">
                                    <div className="flex-1 bg-surface border border-borderCustom rounded p-3 min-w-0">
                                        <span className="text-[8px] font-bold text-accentRed tracking-wider block mb-1">COMPROMISED</span>
                                        <span className="text-xs text-white font-mono block truncate">{brief.blast_radius.compromised_asset}</span>
                                    </div>
                                    <span className="text-textMuted text-xs shrink-0">&rarr;</span>
                                    <div className="flex-1 bg-surface border border-borderCustom rounded p-3 min-w-0">
                                        <span className="text-[8px] font-bold text-accentOrange tracking-wider block mb-1">PIVOT TARGET</span>
                                        <span className="text-xs text-white font-mono block truncate">{brief.blast_radius.predicted_next_target}</span>
                                    </div>
                                    <span className="text-textMuted text-xs shrink-0">&rarr;</span>
                                    <div className="flex-1 bg-surface border border-borderCustom rounded p-3 min-w-0">
                                        <span className="text-[8px] font-bold text-accentYellow tracking-wider block mb-1">CROWN JEWEL</span>
                                        <span className="text-xs text-white font-mono block truncate">{brief.blast_radius.assets_at_risk[1]}</span>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <span className="text-[10px] font-bold text-textMuted tracking-wider uppercase block mb-4">LATERAL MOVEMENT PATH</span>
                                <div className="relative flex flex-col gap-4 pl-8">
                                    <div className="absolute left-3 top-2 bottom-2 w-[1px] bg-borderCustom"></div>
                                    {brief.blast_radius.lateral_path.map((step, idx) => (
                                        <div key={idx} className="relative flex items-center">
                                            <span className="absolute -left-8 w-6 h-6 rounded-full bg-surfaceRaised border border-borderCustom text-accentBlue font-mono text-xs flex items-center justify-center font-bold">
                                                {idx + 1}
                                            </span>
                                            <span className="text-xs text-textPrimary font-mono">{step}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <span className="text-[10px] font-bold text-textMuted tracking-wider uppercase block mb-2">ASSETS AT RISK</span>
                                <div className="flex flex-wrap gap-2">
                                    {brief.blast_radius.assets_at_risk.map((asset, idx) => (
                                        <span key={idx} className="px-2 py-1 bg-accentRed/5 border border-accentRed/20 text-accentRed text-[10px] font-semibold rounded font-mono">
                                            ⚠ {asset}
                                        </span>
                                    ))}
                                </div>
                            </div>

                            <div className="w-full h-[1px] bg-borderCustom"></div>

                            <div className="flex-grow">
                                <span className="text-[10px] font-bold text-textMuted tracking-wider uppercase block mb-3">RECOMMENDED ACTIONS</span>
                                <div className="flex flex-col border border-borderCustom rounded divide-y divide-borderCustom bg-surface/30">
                                    {brief.recommended_actions.map(act => (
                                        <div key={act.priority} className="flex items-center gap-3 p-3 text-xs hover:bg-surface/50 transition-colors duration-100">
                                            <span className={`font-mono text-[10px] px-1.5 py-0.5 border rounded shrink-0 ${getPriorityClass(act.priority)}`}>
                                                P{act.priority}
                                            </span>
                                            <span className={`font-mono text-[9px] px-2 py-0.5 border rounded tracking-wider uppercase shrink-0 ${getUrgencyClass(act.urgency)}`}>
                                                {act.urgency}
                                            </span>
                                            <span className="text-white font-medium pl-1 leading-snug">{act.action}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>

                        {/* RIGHT COLUMN: Analyst Chat */}
                        <aside className="w-[30%] p-5 flex flex-col justify-between overflow-hidden">
                            <div className="flex flex-col h-[calc(100%-48px)]">
                                <div className="pb-2.5 border-b border-borderCustom mb-4 flex justify-between items-center select-none">
                                    <div className="flex items-center gap-2">
                                        <svg className="w-4 h-4 text-accentBlue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                        </svg>
                                        <span className="text-xs font-bold text-white tracking-widest font-mono">GHOST PROTOCOL</span>
                                        <div className="w-[1px] h-3 bg-borderCustom"></div>
                                        <span className="text-[10px] text-textMuted tracking-wider uppercase">ANALYST INTERFACE</span>
                                    </div>
                                    <div className="flex items-center gap-1.5 bg-accentGreen/10 border border-accentGreen/20 px-1.5 py-0.5 rounded text-[8px] text-accentGreen font-bold tracking-widest">
                                        <span className="w-1.5 h-1.5 bg-accentGreen rounded-full animate-pulse"></span> ONLINE
                                    </div>
                                </div>

                                <div className="flex-grow overflow-y-auto pr-1 flex flex-col gap-4">
                                    {chatMessages.map((msg, idx) => (
                                        <div key={idx} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                            <div class={`max-w-[85%] px-4 py-3 rounded-lg text-xs leading-relaxed ${
                                                msg.role === 'user' 
                                                    ? 'bg-accentBlue text-white rounded-tr-none font-sans' 
                                                    : 'bg-surface border-l-2 border-accentBlue text-textPrimary rounded-tl-none font-mono'
                                            }`}>
                                                {msg.content}
                                            </div>
                                            <span className="text-[9px] text-textMuted font-mono mt-1 px-1">
                                                {msg.timestamp}
                                            </span>
                                        </div>
                                    ))}
                                    {chatLoading && (
                                        <div className="flex flex-col items-start">
                                            <div className="flex items-center gap-1 px-3 py-2.5 bg-surface border-l-2 border-accentBlue rounded-lg rounded-tl-none w-max">
                                                <div className="w-1.5 h-1.5 bg-accentBlue rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></div>
                                                <div className="w-1.5 h-1.5 bg-accentBlue rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></div>
                                                <div className="w-1.5 h-1.5 bg-accentBlue rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></div>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef}></div>
                                </div>
                            </div>

                            <form onSubmit={handleSendMessage} className="flex gap-2">
                                <input 
                                    type="text"
                                    value={chatInput}
                                    onChange={(e) => setChatInput(e.target.value)}
                                    placeholder="Ask Ghost Protocol..."
                                    className="flex-grow h-9 px-3 bg-surfaceRaised border border-borderCustom rounded text-xs text-textPrimary focus:outline-none focus:border-accentBlue placeholder-textMuted font-sans"
                                />
                                <button 
                                    type="submit"
                                    disabled={chatLoading}
                                    className="h-9 px-4 bg-accentBlue hover:bg-accentBlue/90 disabled:bg-accentBlue/50 text-white font-mono font-bold text-[10px] uppercase tracking-widest rounded transition-colors duration-100"
                                >
                                    SEND
                                </button>
                            </form>
                        </aside>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
