<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Protocol - Threat Theatre</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0d1117',
                        surface: '#161b22',
                        'surface-raised': '#1c2128',
                        border: '#30363d',
                        accent: '#388bfd',
                        'accent-hover': '#4f9ef8',
                        success: '#3fb950',
                        warning: '#d29922',
                        danger: '#f85149',
                        'text-primary': '#e6edf3',
                        'text-secondary': '#8b949e',
                        'text-muted': '#484f58',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d; 
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #484f58; 
        }

        /* Phase 3 fade in */
        @keyframes fadeLayoutIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-layout-in {
            animation: fadeLayoutIn 0.4s ease-out forwards;
        }
        
        /* Line fading */
        .fade-line {
            transition: opacity 0.3s ease-out;
            opacity: 0;
        }
        .fade-line.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 1. Initial Checks
        const envRaw = localStorage.getItem('gp_environment');
        if (!envRaw) window.location.href = 'onboarding.html';
        
        let env;
        try {
            env = JSON.parse(envRaw);
            if (!env || !env.org_name) throw new Error("Invalid env");
        } catch(e) {
            window.location.href = 'onboarding.html';
        }

        const scenarioRaw = sessionStorage.getItem('gp_selected_scenario');
        let scenario = { asset_type: 'canary_aws_token', display_name: 'AWS Canary Token Breach' };
        if (scenarioRaw) {
            try {
                scenario = JSON.parse(scenarioRaw);
            } catch(e) {}
        }

        const API_BASE = window.location.protocol === 'file:' || (window.location.port && window.location.port !== '8000')
            ? 'http://localhost:8000'
            : '';

        const App = () => {
            const [phase, setPhase] = React.useState(1);
            const [progress, setProgress] = React.useState(0);
            const [phase2Lines, setPhase2Lines] = React.useState([false, false, false]);
            
            const [briefData, setBriefData] = React.useState(null);
            const [correlationData, setCorrelationData] = React.useState(null);
            const [totalCves, setTotalCves] = React.useState(0);
            
            const [chatMessages, setChatMessages] = React.useState([]);
            const [chatInput, setChatInput] = React.useState('');
            const [isChatTyping, setIsChatTyping] = React.useState(false);
            const [suggestedQuestions, setSuggestedQuestions] = React.useState([]);
            const [questionsLoading, setQuestionsLoading] = React.useState(false);
            const [ipReputation, setIpReputation] = React.useState(null);
            const [mitreOsint, setMitreOsint] = React.useState(null);
            const [attackTimeline, setAttackTimeline] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('blast-radius');
            
            const chatEndRef = React.useRef(null);

            // Fetch Data
            React.useEffect(() => {
                const sourceIp = "198.51.100.42";

                // Analyze
                fetch(API_BASE + '/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        asset_type: scenario.asset_type,
                        source_ip: sourceIp,
                        user_environment: env
                    })
                }).then(r => r.json()).then(data => {
                    setBriefData(data);
                    
                    // Fetch suggested questions
                    setQuestionsLoading(true);
                    fetch(API_BASE + '/api/suggested-questions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            brief_summary: data.summary,
                            suspected_group: data.attacker_profile?.suspected_group || 'Unknown Actor',
                            asset_type: scenario.asset_type,
                            existing_security_tools: env.existing_security_tools,
                            industry: env.industry
                        })
                    }).then(r => r.json()).then(qData => {
                        setSuggestedQuestions(qData.questions || []);
                    }).catch(err => {
                        console.error("Suggested questions error", err);
                        setSuggestedQuestions([
                            "What lateral movement has occurred?",
                            "Which assets should I isolate first?",
                            "Should I notify my security team?"
                        ]);
                    }).finally(() => {
                        setQuestionsLoading(false);
                    });

                    // Fetch enrichment APIs in parallel
                    Promise.allSettled([
                        fetch(API_BASE + '/api/ip-reputation', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ip_address: sourceIp })
                        }).then(r => r.json()),
                        
                        fetch(API_BASE + '/api/mitre-osint', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                suspected_group: data.attacker_profile.suspected_group,
                                technique_ids: data.attacker_profile.ttps.map(t => t.technique_id)
                            })
                        }).then(r => r.json()),

                        fetch(API_BASE + '/api/attack-timeline', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                asset_type: scenario.asset_type,
                                technique_ids: data.attacker_profile.ttps.map(t => t.technique_id),
                                compromised_asset: data.blast_radius.compromised_asset,
                                predicted_next_target: data.blast_radius.predicted_next_target,
                                lateral_path: data.blast_radius.lateral_path,
                                org_name: env.org_name,
                                cloud_provider: env.cloud_provider
                            })
                        }).then(r => r.json()),

                        fetch(API_BASE + '/api/history/save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                event_id: data.event_id || "",
                                asset_type: scenario.asset_type,
                                display_name: scenario.display_name,
                                org_name: env.org_name,
                                suspected_group: data.attacker_profile.suspected_group,
                                confidence_score: data.attacker_profile.confidence_score,
                                compromised_asset: data.blast_radius.compromised_asset,
                                predicted_next_target: data.blast_radius.predicted_next_target,
                                risk_level: scenario.threat_level,
                                summary: data.summary
                            })
                        }).then(r => r.json())
                    ]).then(([ipRes, mitreRes, timelineRes, historyRes]) => {
                        if (ipRes.status === 'fulfilled') setIpReputation(ipRes.value);
                        if (mitreRes.status === 'fulfilled') setMitreOsint(mitreRes.value);
                        if (timelineRes.status === 'fulfilled') setAttackTimeline(timelineRes.value);
                        
                        if (historyRes.status === 'fulfilled' && historyRes.value) {
                            try {
                                const localHistoryRaw = localStorage.getItem('gp_threat_history');
                                let historyList = [];
                                if (localHistoryRaw) {
                                    historyList = JSON.parse(localHistoryRaw);
                                    if (!Array.isArray(historyList)) historyList = [];
                                }
                                historyList.unshift(historyRes.value);
                                if (historyList.length > 20) {
                                    historyList = historyList.slice(0, 20);
                                }
                                localStorage.setItem('gp_threat_history', JSON.stringify(historyList));
                            } catch (e) {
                                console.error("History saving failed", e);
                            }
                        }
                    });
                }).catch(console.error);

                // Fetch CVEs and Correlate
                fetch(API_BASE + '/api/threat-feed').then(r => r.json()).then(feedData => {
                    const cves = feedData.cves || [];
                    setTotalCves(cves.length);
                    return fetch(API_BASE + '/api/correlate-cves', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            cves: cves,
                            asset_type: scenario.asset_type,
                            user_environment: env
                        })
                    });
                }).then(r => r.json()).then(data => setCorrelationData(data)).catch(console.error);
            }, []);

            // Phase 1 Logic
            React.useEffect(() => {
                if (phase === 1) {
                    setTimeout(() => setProgress(100), 50); // Start progress bar
                    const t = setTimeout(() => setPhase(2), 3000);
                    return () => clearTimeout(t);
                }
            }, [phase]);

            // Phase 2 Logic
            React.useEffect(() => {
                if (phase === 2) {
                    const t1 = setTimeout(() => setPhase2Lines([true, false, false]), 800);
                    const t2 = setTimeout(() => setPhase2Lines([true, true, false]), 1600);
                    const t3 = setTimeout(() => setPhase2Lines([true, true, true]), 2400);
                    const t4 = setTimeout(() => setPhase(3), 3000);
                    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); };
                }
            }, [phase]);

            // Phase 3 Initial Chat
            React.useEffect(() => {
                if (phase === 3 && briefData && chatMessages.length === 0) {
                    const orgName = env.org_name || 'Organization';
                    const group = briefData.attacker_profile?.suspected_group || 'Unknown Actor';
                    const conf = Math.round((briefData.attacker_profile?.confidence_score || 0) * 100);
                    
                    setChatMessages([{
                        role: 'assistant',
                        content: `Environment loaded: ${orgName}. Brief complete. ${group} identified with ${conf}% confidence. What do you need to know?`,
                        timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                    }]);
                }
            }, [phase, briefData, chatMessages.length]);

            // Auto-scroll chat
            React.useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [chatMessages, isChatTyping, phase]);

            const handleChatSend = (e, directText = null) => {
                if (e && e.preventDefault) e.preventDefault();
                const textToSend = directText !== null ? directText : chatInput;
                if (!textToSend.trim() || isChatTyping) return;
 
                const userMsg = {
                    role: 'user',
                    content: textToSend.trim(),
                    timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                };
 
                const newHistory = [...chatMessages, userMsg];
                setChatMessages(newHistory);
                if (directText === null) {
                    setChatInput('');
                }
                setIsChatTyping(true);

                const apiContext = JSON.stringify({ brief: briefData, environment: env });
                
                fetch(API_BASE + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        brief_context: apiContext,
                        messages: newHistory.map(m => ({role: m.role, content: m.content})),
                        new_message: userMsg.content
                    })
                }).then(r => r.json()).then(data => {
                    setIsChatTyping(false);
                    setChatMessages([...newHistory, {
                        role: 'assistant',
                        content: data.reply,
                        timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                    }]);
                }).catch(err => {
                    console.error("Chat error", err);
                    setIsChatTyping(false);
                });
            };

            const handleChatKeyDown = (e) => {
                if (e.key === 'Enter') handleChatSend(e);
            };

            // Render Phase 1
            if (phase === 1) {
                return (
                    <div className="h-screen w-full flex flex-col items-center justify-center bg-background">
                        <div className="w-full max-w-[600px] text-center px-4">
                            <div className="text-[13px] font-mono text-warning tracking-[0.15em] mb-2">⚠ DECEPTION ASSET TRIGGERED</div>
                            <h1 className="text-[28px] font-semibold font-sans text-text-primary leading-tight mb-4">{scenario.display_name}</h1>
                            <div className="text-[12px] font-mono text-text-secondary mb-8">
                                SOURCE: 198.51.100.42 &nbsp;//&nbsp; TARGET: {env.org_name}
                            </div>
                            
                            <div className="w-full h-1 bg-surface rounded-full mb-3 overflow-hidden">
                                <div 
                                    className="h-full bg-accent transition-all ease-linear" 
                                    style={{ width: `${progress}%`, transitionDuration: '2.95s' }}
                                ></div>
                            </div>
                            
                            <div className="text-[11px] font-mono text-text-muted">INITIATING THREAT ANALYSIS...</div>
                        </div>
                    </div>
                );
            }

            // Render Phase 2
            if (phase === 2) {
                return (
                    <div className="h-screen w-full flex flex-col items-center justify-center bg-background">
                        <div className="w-full max-w-[700px] px-4">
                            <div className="text-center mb-10">
                                <div className="text-[11px] font-mono text-text-muted">GHOST PROTOCOL // THREAT CORRELATION ENGINE</div>
                            </div>
                            
                            <div className="space-y-4 mb-10">
                                <div className={`text-[12px] font-mono text-text-secondary fade-line ${phase2Lines[0] ? 'visible' : ''}`}>
                                    ► Querying MITRE ATT&amp;CK knowledge base for {scenario.asset_type}...
                                </div>
                                <div className={`text-[12px] font-mono text-text-secondary fade-line ${phase2Lines[1] ? 'visible' : ''}`}>
                                    ► Cross-referencing {totalCves || '--'} live CVEs against {env.cloud_provider} environment...
                                </div>
                                <div className={`text-[12px] font-mono text-text-secondary fade-line ${phase2Lines[2] ? 'visible' : ''}`}>
                                    ► Correlating threat indicators for {env.org_name}...
                                </div>
                            </div>

                            <div className="pt-6 border-t border-border">
                                {correlationData && correlationData.relevant_cves && correlationData.relevant_cves.length > 0 ? (
                                    <div className="space-y-3">
                                        {correlationData.relevant_cves.slice(0, 2).map((cve, i) => (
                                            <div key={i} className={`text-[12px] font-mono ${cve.risk_level === 'Directly Exploitable' ? 'text-danger' : 'text-warning'}`}>
                                                RELEVANT: {cve.cve_id} — {cve.relevance_reason}
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="text-[11px] font-mono text-text-muted">CORRELATING...</div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // Render Phase 3 (War Room)
            if (!briefData) {
                return <div className="h-screen bg-background flex items-center justify-center text-[11px] font-mono text-text-muted">FINALIZING BRIEF...</div>;
            }

            const confScore = Math.round((briefData.attacker_profile?.confidence_score || 0) * 100);
            const confColor = confScore > 80 ? 'text-danger' : (confScore > 60 ? 'text-warning' : 'text-success');

            const priorityBadgeColors = {
                1: 'text-danger border border-danger/30 bg-danger/10',
                2: 'text-warning border border-warning/30 bg-warning/10',
                3: 'text-success border border-success/30 bg-success/10'
            };

            const urgencyColors = {
                'Immediate': 'text-danger',
                'Within 1 hour': 'text-warning',
                'Within 24 hours': 'text-success'
            };

            return (
                <div className="h-screen w-full flex flex-col font-sans bg-background text-text-primary animate-layout-in">
                    
                    {/* TOP NAV BAR */}
                    <div className="flex-none h-10 w-full bg-surface border-b border-border flex items-center justify-between px-4 z-50">
                        <div 
                            className="flex items-center space-x-2 cursor-pointer text-text-secondary hover:text-text-primary transition-colors"
                            onClick={() => window.location.href = 'index.html'}
                        >
                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                            <span className="text-[12px] font-semibold tracking-wide">NEW MISSION</span>
                        </div>
                        
                        <div className="flex items-center space-x-3">
                            <span className="text-[12px] font-mono text-text-muted">PREDICTIVE ATTACKER BRIEF</span>
                            <span className="text-[11px] font-mono text-accent">{briefData.event_id}</span>
                        </div>

                        <div className="text-[11px] font-mono text-text-muted">
                            {briefData.generated_at}
                        </div>
                    </div>

                    {/* THREE COLUMNS */}
                    <div className="flex-1 flex overflow-hidden">
                        
                        {/* LEFT COLUMN */}
                        <div className="w-[24%] h-full border-r border-border p-5 overflow-y-auto">
                            <h2 className="text-[11px] uppercase tracking-[0.1em] text-text-muted font-semibold mb-2">Threat Actor</h2>
                            <hr className="border-border mb-4" />
                            
                            <div className="mb-4">
                                <div className={`text-[40px] font-bold font-sans leading-none tracking-tight ${confColor}`}>
                                    {confScore}%
                                </div>
                                <div className="text-[10px] text-text-muted font-semibold mt-1 uppercase">Confidence Score</div>
                            </div>
                            
                            <hr className="border-border mb-4" />
                            <div className="text-[14px] font-semibold text-text-primary mb-4">{briefData.attacker_profile?.suspected_group || 'Unknown'}</div>
                            <hr className="border-border mb-4" />
                            
                            <h2 className="text-[11px] uppercase tracking-[0.1em] text-text-muted font-semibold mb-2">MITRE ATT&amp;CK</h2>
                            <div className="space-y-2 mb-4">
                                {briefData.attacker_profile?.ttps?.map((ttp, idx) => (
                                    <div key={idx} className="flex flex-col">
                                        <div className="flex items-baseline space-x-2 mb-0.5">
                                            <span className="text-[12px] font-mono font-bold text-accent">{ttp.technique_id}</span>
                                            <span className="text-[13px] text-text-primary leading-tight">{ttp.technique_name}</span>
                                        </div>
                                        <span className="text-[11px] text-text-muted mb-1.5">{ttp.tactic}</span>
                                        <div className="w-full h-[2px] bg-surface rounded-full overflow-hidden">
                                            <div className="h-full bg-accent" style={{ width: `${(ttp.confidence || 0) * 100}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            <hr className="border-border mb-4" />
                            <h2 className="text-[11px] uppercase tracking-[0.1em] text-text-muted font-semibold mb-2">Source IP Intelligence</h2>
                            <hr className="border-border mb-4" />

                            {ipReputation === null ? (
                                <div className="text-[11px] font-mono text-text-muted mb-4">Querying AbuseIPDB...</div>
                            ) : (
                                <div className="space-y-4 mb-4">
                                    <div className="flex justify-between items-center">
                                        <span className="text-[13px] font-mono text-accent">{ipReputation.ip_address}</span>
                                        <span className={`text-[10px] font-mono border rounded-sm px-1.5 py-0.5 font-bold ${
                                            ipReputation.threat_level === 'CRITICAL' ? 'bg-danger/10 border-danger/30 text-danger' :
                                            ipReputation.threat_level === 'HIGH' ? 'bg-warning/10 border-warning/30 text-warning' :
                                            ipReputation.threat_level === 'SUSPICIOUS' ? 'bg-warning/5 border-warning/20 text-warning' :
                                            ipReputation.threat_level === 'CLEAN' ? 'bg-success/10 border-success/30 text-success' :
                                            'bg-surface-raised border-border text-text-secondary'
                                        }`}>
                                            {ipReputation.threat_level}
                                        </span>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <div className="text-[10px] text-text-muted font-semibold uppercase">Country</div>
                                            <div className="text-[12px] font-mono text-text-primary truncate">{ipReputation.country_name}</div>
                                        </div>
                                        <div>
                                            <div className="text-[10px] text-text-muted font-semibold uppercase">ISP</div>
                                            <div className="text-[12px] font-mono text-text-primary truncate">{ipReputation.isp}</div>
                                        </div>
                                        <div>
                                            <div className="text-[10px] text-text-muted font-semibold uppercase">Usage Type</div>
                                            <div className="text-[12px] font-mono text-text-primary truncate">{ipReputation.usage_type}</div>
                                        </div>
                                        <div>
                                            <div className="text-[10px] text-text-muted font-semibold uppercase">Reports</div>
                                            <div className="text-[12px] font-mono text-text-primary">{ipReputation.total_reports}</div>
                                        </div>
                                        <div>
                                            <div className="text-[10px] text-text-muted font-semibold uppercase">Last Seen</div>
                                            <div className="text-[12px] font-mono text-text-primary">{ipReputation.last_reported_at}</div>
                                        </div>
                                        <div>
                                            <div className="text-[10px] text-text-muted font-semibold uppercase">TOR Exit</div>
                                            <div className="text-[12px] font-mono text-text-primary">{ipReputation.is_tor ? 'YES' : 'NO'}</div>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-1">
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] text-text-muted font-semibold uppercase">Abuse Confidence</span>
                                            <span className="text-[11px] font-mono text-text-primary">{ipReputation.abuse_confidence_score}%</span>
                                        </div>
                                        <div className="w-full h-1 bg-surface-raised rounded-full overflow-hidden">
                                            <div className={`h-full ${
                                                ipReputation.threat_level === 'CRITICAL' ? 'bg-danger' :
                                                ipReputation.threat_level === 'HIGH' ? 'bg-warning' :
                                                ipReputation.threat_level === 'SUSPICIOUS' ? 'bg-warning' :
                                                'bg-success'
                                            }`} style={{ width: `${ipReputation.abuse_confidence_score}%` }}></div>
                                        </div>
                                    </div>
                                    
                                    {ipReputation.abuse_confidence_score >= 40 && (
                                        <div className="bg-surface-raised border-l-2 border-danger text-danger text-[11px] p-2">
                                            ⚠ This IP has active abuse reports. Cross-reference with your firewall logs.
                                        </div>
                                    )}
                                </div>
                            )}

                            <hr className="border-border mb-4" />
                            <h2 className="text-[11px] uppercase tracking-[0.1em] text-text-muted font-semibold mb-2">Correlated CVEs</h2>
                            <div className="space-y-3 mb-4">
                                {correlationData?.relevant_cves?.length > 0 ? (
                                    correlationData.relevant_cves.map((cve, idx) => {
                                        let riskColor = 'text-text-muted';
                                        let badgeColor = 'bg-surface-raised border-border text-text-secondary';
                                        if (cve.risk_level === 'Directly Exploitable') {
                                            riskColor = 'text-danger';
                                            badgeColor = 'bg-danger/10 border-danger/30 text-danger';
                                        } else if (cve.risk_level === 'Lateral Risk') {
                                            riskColor = 'text-warning';
                                            badgeColor = 'bg-warning/10 border-warning/30 text-warning';
                                        }

                                        return (
                                            <div key={idx} className="flex flex-col">
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className={`text-[12px] font-mono font-bold ${riskColor}`}>{cve.cve_id}</span>
                                                    <span className={`text-[9px] font-mono border rounded-sm px-1 py-0.5 whitespace-nowrap ${badgeColor}`}>
                                                        {cve.risk_level}
                                                    </span>
                                                </div>
                                                <div className="text-[11px] text-text-secondary leading-snug">{cve.relevance_reason}</div>
                                            </div>
                                        );
                                    })
                                ) : (
                                    <div className="text-[11px] font-mono text-text-muted">No relevant CVEs found.</div>
                                )}
                            </div>

                            <hr className="border-border mb-4" />
                            <div className="text-[13px] text-text-secondary italic leading-relaxed pb-4">
                                "{briefData.summary}"
                            </div>
                        </div>

                        {/* CENTER COLUMN */}
                        <div className="w-[46%] h-full flex flex-col bg-background border-r border-border">
                            {/* Tab Bar */}
                            <div className="flex-none h-9 border-b border-border flex bg-surface">
                                {[
                                    { id: 'blast-radius', label: 'BLAST RADIUS' },
                                    { id: 'timeline', label: 'ATTACK TIMELINE' },
                                    { id: 'osint', label: 'THREAT ACTOR OSINT' },
                                    { id: 'actions', label: 'ACTIONS' }
                                ].map(t => (
                                    <button
                                        key={t.id}
                                        onClick={() => setActiveTab(t.id)}
                                        className={`px-4 text-[12px] font-sans font-semibold tracking-wide border-b-2 cursor-pointer transition-all duration-150 ${
                                            activeTab === t.id 
                                                ? 'border-accent text-text-primary bg-background/20' 
                                                : 'border-transparent text-text-secondary hover:text-text-primary'
                                        }`}
                                    >
                                        {t.label}
                                    </button>
                                ))}
                            </div>

                            {/* Tab Content */}
                            <div className="flex-1 p-5 overflow-y-auto">
                                {activeTab === 'blast-radius' && (
                                    <div className="space-y-6">
                                        <h2 className="text-[11px] uppercase tracking-[0.1em] text-text-muted font-semibold mb-2">Blast Radius</h2>
                                        <hr className="border-border mb-4" />
                                        
                                        <div className="flex items-center space-x-2 mb-6 overflow-x-auto pb-2">
                                            {/* Box 1 */}
                                            <div className="bg-surface-raised border border-border rounded-sm px-3.5 py-2.5 flex flex-col flex-shrink-0">
                                                <span className="text-[9px] font-bold text-danger mb-1 tracking-wider">COMPROMISED</span>
                                                <span className="text-[12px] font-mono text-text-primary whitespace-nowrap">{briefData.blast_radius?.compromised_asset || '--'}</span>
                                            </div>
                                            <span className="text-text-muted flex-shrink-0">→</span>
                                            {/* Box 2 */}
                                            <div className="bg-surface-raised border border-border rounded-sm px-3.5 py-2.5 flex flex-col flex-shrink-0">
                                                <span className="text-[9px] font-bold text-warning mb-1 tracking-wider">PIVOT TARGET</span>
                                                <span className="text-[12px] font-mono text-text-primary whitespace-nowrap">{briefData.blast_radius?.predicted_next_target || '--'}</span>
                                            </div>
                                            <span className="text-text-muted flex-shrink-0">→</span>
                                            {/* Box 3 */}
                                            <div className="bg-surface-raised border border-border rounded-sm px-3.5 py-2.5 flex flex-col flex-shrink-0">
                                                <span className="text-[9px] font-bold text-text-muted mb-1 tracking-wider">CROWN JEWEL</span>
                                                <span className="text-[12px] font-mono text-text-primary whitespace-nowrap">
                                                    {(briefData.blast_radius?.assets_at_risk && briefData.blast_radius.assets_at_risk.length > 0) 
                                                        ? briefData.blast_radius.assets_at_risk[briefData.blast_radius.assets_at_risk.length - 1] 
                                                        : '--'}
                                                </span>
                                            </div>
                                        </div>

                                        <h2 className="text-[11px] uppercase tracking-[0.1em] text-text-muted font-semibold mb-2">Lateral Movement Path</h2>
                                        <div className="flex flex-col mb-6 ml-2">
                                            {briefData.blast_radius?.lateral_path?.map((step, idx, arr) => (
                                                <div key={idx} className="flex flex-col">
                                                    <div className="flex items-center space-x-3">
                                                        <div className="w-5 h-5 bg-surface-raised border border-border flex items-center justify-center rounded-sm text-[11px] font-mono font-bold text-accent flex-shrink-0">
                                                            {idx + 1}
                                                        </div>
                                                        <div className="text-[13px] text-text-secondary">{step}</div>
                                                    </div>
                                                    {idx < arr.length - 1 && (
                                                        <div className="h-4 border-l border-border ml-[9px] my-1"></div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>

                                        <h2 className="text-[11px] uppercase tracking-[0.1em] text-text-muted font-semibold mb-2">Assets At Risk</h2>
                                        <div className="flex flex-wrap gap-2">
                                            {briefData.blast_radius?.assets_at_risk?.map((asset, idx) => (
                                                <div key={idx} className="border border-danger text-danger text-[11px] font-mono rounded-sm px-2 py-0.5">
                                                    {asset}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'timeline' && (
                                    <div className="space-y-4">
                                        {attackTimeline === null ? (
                                            <div className="text-[11px] font-mono text-text-muted">Reconstructing attack timeline...</div>
                                        ) : !attackTimeline.timeline || attackTimeline.timeline.length === 0 ? (
                                            <div className="text-[11px] text-text-muted">Timeline data unavailable.</div>
                                        ) : (
                                            <div className="space-y-4">
                                                <div className="flex justify-between items-center text-[11px] font-mono">
                                                    <span className="text-text-muted uppercase tracking-wider">EST. DWELL TIME: {attackTimeline.total_dwell_time}</span>
                                                    <span className="text-warning uppercase tracking-wider">EXFIL WINDOW: {attackTimeline.exfiltration_window}</span>
                                                </div>
                                                <hr className="border-border" />
                                                
                                                <div className="divide-y divide-border/50">
                                                    {attackTimeline.timeline.map((evt, idx) => {
                                                        const p = evt.phase.toLowerCase();
                                                        let phaseColor = 'bg-surface-raised text-text-secondary border-border';
                                                        if (p.includes('access') || p.includes('execution') || p.includes('exfiltration')) {
                                                            phaseColor = 'bg-danger/10 text-danger border-danger/20';
                                                        } else if (p.includes('persistence') || p.includes('escalation')) {
                                                            phaseColor = 'bg-warning/10 text-warning border-warning/20';
                                                        } else if (p.includes('lateral') || p.includes('collection')) {
                                                            phaseColor = 'bg-warning/5 text-warning border-warning/10';
                                                        }
                                                        
                                                        let borderLeftColor = 'border-l-text-muted';
                                                        const sev = evt.severity.toLowerCase();
                                                        if (sev === 'critical') borderLeftColor = 'border-l-danger';
                                                        else if (sev === 'high') borderLeftColor = 'border-l-warning';
                                                        else if (sev === 'medium') borderLeftColor = 'border-l-warning/70';

                                                        return (
                                                            <div key={idx} className={`flex items-center justify-between py-3 border-l-2 pl-3 ${borderLeftColor} gap-3`}>
                                                                <div className="flex items-center space-x-3 min-w-0 flex-1">
                                                                    <span className="text-[12px] font-mono text-accent font-bold w-[60px] flex-shrink-0">{evt.offset}</span>
                                                                    <span className={`text-[10px] font-mono border rounded-sm px-1.5 py-0.5 whitespace-nowrap flex-shrink-0 ${phaseColor}`}>
                                                                        {evt.phase}
                                                                    </span>
                                                                    <span className="text-[13px] text-text-primary truncate">{evt.event}</span>
                                                                </div>
                                                                {evt.mitre_technique && (
                                                                    <span className="text-[11px] font-mono text-text-muted flex-shrink-0">{evt.mitre_technique}</span>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {activeTab === 'osint' && (
                                    <div className="space-y-4">
                                        {mitreOsint === null ? (
                                            <div className="text-[11px] font-mono text-text-muted">Querying MITRE ATT&amp;CK database...</div>
                                        ) : (
                                            <div className="space-y-4">
                                                <div>
                                                    <h3 className="text-[16px] font-semibold text-text-primary font-sans">{mitreOsint.group_name}</h3>
                                                    {mitreOsint.aliases && mitreOsint.aliases.length > 0 && (
                                                        <div className="flex flex-wrap gap-1.5 mt-2">
                                                            {mitreOsint.aliases.map((a, i) => (
                                                                <span key={i} className="border border-border text-text-muted px-1.5 py-0.5 rounded-sm text-[11px] font-mono">
                                                                    {a}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <div className="text-[10px] text-text-muted font-semibold uppercase">Motivation</div>
                                                        <div className={`text-[12px] font-mono font-semibold ${
                                                            mitreOsint.motivation === 'Financial' ? 'text-warning' :
                                                            mitreOsint.motivation === 'Espionage' ? 'text-danger' :
                                                            mitreOsint.motivation === 'Hacktivism' ? 'text-accent' :
                                                            mitreOsint.motivation === 'Destruction' ? 'text-danger' :
                                                            'text-text-secondary'
                                                        }`}>{mitreOsint.motivation}</div>
                                                    </div>
                                                    <div>
                                                        <div className="text-[10px] text-text-muted font-semibold uppercase">Origin</div>
                                                        <div className="text-[12px] text-text-primary">{mitreOsint.origin}</div>
                                                    </div>
                                                    <div className="col-span-2">
                                                        <div className="text-[10px] text-text-muted font-semibold uppercase">Targets</div>
                                                        <div className="text-[12px] text-text-secondary">{mitreOsint.typical_targets}</div>
                                                    </div>
                                                </div>
                                                
                                                <hr className="border-border" />
                                                <div>
                                                    <div className="text-[11px] font-semibold text-text-muted tracking-wider uppercase font-sans mb-1">KNOWN CAMPAIGNS</div>
                                                    <p className="text-[13px] text-text-secondary leading-relaxed">{mitreOsint.known_campaigns}</p>
                                                </div>
                                                
                                                <hr className="border-border" />
                                                <div>
                                                    <div className="text-[11px] font-semibold text-text-muted tracking-wider uppercase font-sans mb-1">WHY THIS GROUP</div>
                                                    <p className="text-[13px] text-text-secondary italic leading-relaxed">{mitreOsint.why_relevant}</p>
                                                </div>
                                                
                                                <div className="pt-2">
                                                    <a 
                                                        href="https://attack.mitre.org/groups/" 
                                                        target="_blank" 
                                                        rel="noopener noreferrer" 
                                                        className="text-[11px] text-accent hover:text-accent-hover hover:underline transition-colors font-mono"
                                                    >
                                                        View on MITRE ATT&amp;CK →
                                                    </a>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {activeTab === 'actions' && (
                                    <div className="space-y-4">
                                        <h2 className="text-[11px] uppercase tracking-[0.1em] text-text-muted font-semibold mb-2">Recommended Actions</h2>
                                        <div className="flex flex-col border-t border-border">
                                            {briefData.recommended_actions?.map((act, idx) => {
                                                const pBadge = priorityBadgeColors[act.priority] || priorityBadgeColors[3];
                                                const uColor = urgencyColors[act.urgency] || 'text-text-muted';
                                                return (
                                                    <div key={idx} className="flex items-center justify-between py-3 border-b border-border gap-4">
                                                        <div className="flex items-center space-x-3 flex-shrink-0">
                                                            <div className={`w-6 h-5 rounded-sm flex items-center justify-center text-[11px] font-mono font-bold ${pBadge}`}>
                                                                P{act.priority}
                                                            </div>
                                                            <div className={`text-[11px] font-mono whitespace-nowrap ${uColor}`}>
                                                                {act.urgency}
                                                            </div>
                                                        </div>
                                                        <div className="text-[13px] text-text-primary text-right flex-1">
                                                            {act.action}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* RIGHT COLUMN (CHAT) */}
                        <div className="w-[30%] h-full border-l border-border flex flex-col bg-background">
                            {/* Chat Header */}
                            <div className="flex-none h-10 border-b border-border flex items-center justify-between px-4 bg-surface">
                                <div className="flex items-center space-x-2">
                                    <svg className="w-3.5 h-3.5 text-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                                    </svg>
                                    <span className="text-[13px] font-semibold text-text-primary tracking-wide">GHOST PROTOCOL</span>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <span className="w-1.5 h-1.5 rounded-full bg-success"></span>
                                    <span className="text-[11px] font-semibold text-text-muted uppercase">Analyst Interface</span>
                                </div>
                            </div>

                            {/* Chat Messages */}
                            <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
                                {chatMessages.map((msg, idx) => {
                                    const isUser = msg.role === 'user';
                                    return (
                                        <div key={idx} className={`flex flex-col ${isUser ? 'self-end items-end max-w-[85%]' : 'self-start items-start max-w-[90%]'}`}>
                                            <div className={`rounded-sm p-3 ${
                                                isUser 
                                                    ? 'bg-surface-raised border border-border text-[13px] font-sans text-text-primary' 
                                                    : 'bg-surface border-l-2 border-l-accent text-[13px] font-mono text-text-primary'
                                            }`}>
                                                {msg.content}
                                            </div>
                                            <div className="text-[10px] text-text-muted mt-1">{msg.timestamp}</div>
                                        </div>
                                    )
                                })}
                                
                                {isChatTyping && (
                                    <div className="flex flex-col self-start items-start max-w-[90%]">
                                        <div className="bg-surface-raised border-l-2 border-l-accent rounded-sm px-3 py-2 text-[13px] font-mono text-text-muted">
                                            ...
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef}></div>
                            </div>

                            {/* Suggested Questions */}
                            {(questionsLoading || suggestedQuestions.length > 0) && (
                                <div className="flex-none p-3 border-t border-border bg-background">
                                    <div className="text-[10px] text-text-muted font-mono uppercase tracking-wider mb-2">SUGGESTED:</div>
                                    {questionsLoading ? (
                                        <div className="text-[11px] font-mono text-text-muted">Generating suggested questions...</div>
                                    ) : (
                                        <div className="flex flex-wrap gap-1.5">
                                            {suggestedQuestions.map((q, idx) => (
                                                <button
                                                    key={idx}
                                                    onClick={() => {
                                                        handleChatSend(null, q);
                                                        setSuggestedQuestions([]);
                                                    }}
                                                    className="border border-border rounded-sm px-2.5 py-1 text-[11px] text-text-secondary hover:border-accent hover:text-accent transition-all duration-150 text-left"
                                                >
                                                    {q}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Chat Input */}
                            <div className="flex-none p-3 border-t border-border bg-surface">
                                <div className="flex space-x-2">
                                    <input 
                                        type="text" 
                                        value={chatInput}
                                        onChange={e => setChatInput(e.target.value)}
                                        onKeyDown={handleChatKeyDown}
                                        placeholder="Ask Ghost Protocol..."
                                        className="flex-1 bg-surface-raised border border-border rounded-sm px-3 text-[13px] font-sans text-text-primary focus:outline-none focus:border-accent"
                                    />
                                    <button 
                                        onClick={handleChatSend}
                                        disabled={isChatTyping || !chatInput.trim()}
                                        className="w-9 h-9 flex-shrink-0 bg-accent hover:bg-accent-hover text-white flex items-center justify-center rounded-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        <span className="font-mono leading-none">→</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
