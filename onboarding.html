<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Protocol - Environment Setup</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0d1117',
                        surface: '#161b22',
                        'surface-raised': '#1c2128',
                        border: '#30363d',
                        accent: '#388bfd',
                        'accent-hover': '#4f9ef8',
                        success: '#3fb950',
                        warning: '#d29922',
                        danger: '#f85149',
                        'text-primary': '#e6edf3',
                        'text-secondary': '#8b949e',
                        'text-muted': '#484f58',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Initial redirect check before mounting React
        const storedEnv = localStorage.getItem('gp_environment');
        if (storedEnv) {
            try {
                JSON.parse(storedEnv);
                window.location.href = 'index.html';
            } catch (e) {
                // Invalid JSON, ignore and show onboarding
            }
        }

        const App = () => {
            const [orgName, setOrgName] = React.useState('');
            const [industry, setIndustry] = React.useState('Financial Services');
            const [cloudProvider, setCloudProvider] = React.useState('AWS');
            const [teamSize, setTeamSize] = React.useState('1-10');
            const [keyAssets, setKeyAssets] = React.useState('');
            const [osStack, setOsStack] = React.useState('');
            const [securityTools, setSecurityTools] = React.useState('');
            const [useActiveDirectory, setUseActiveDirectory] = React.useState(false);
            const [adConfig, setAdConfig] = React.useState({
                domain_name: '',
                domain_controller_count: '',
                forest_type: '',
                hybrid_mode: '',
                privileged_account_count: '',
                service_account_count: '',
                trust_relationships: '',
                ad_security_tools: ''
            });
            const [architectureDescription, setArchitectureDescription] = React.useState('');
            
            const [errors, setErrors] = React.useState({});
            const [isLoading, setIsLoading] = React.useState(false);
            const [progress, setProgress] = React.useState(0);

            React.useEffect(() => {
                if (isLoading) {
                    const timer = setTimeout(() => setProgress(90), 50);
                    return () => clearTimeout(timer);
                } else {
                    setProgress(0);
                }
            }, [isLoading]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const newErrors = {};
                
                if (!orgName.trim()) newErrors.orgName = 'This field is required';
                if (!industry) newErrors.industry = 'This field is required';
                if (!cloudProvider) newErrors.cloudProvider = 'This field is required';
                if (!teamSize) newErrors.teamSize = 'This field is required';
                if (!keyAssets.trim()) newErrors.keyAssets = 'This field is required';
                if (!osStack.trim()) newErrors.osStack = 'This field is required';
                if (!securityTools.trim()) newErrors.securityTools = 'This field is required';

                if (Object.keys(newErrors).length > 0) {
                    setErrors(newErrors);
                    return;
                }

                const assetsList = keyAssets.split(',').map(item => item.trim()).filter(item => item !== '');

                const envData = {
                    org_name: orgName.trim(),
                    industry: industry,
                    cloud_provider: cloudProvider,
                    team_size: teamSize,
                    key_assets: assetsList,
                    os_stack: osStack.trim(),
                    existing_security_tools: securityTools.trim(),
                    configured_at: new Date().toISOString(),
                    uses_active_directory: useActiveDirectory,
                    active_directory: useActiveDirectory ? {
                        domain_name: adConfig.domain_name,
                        domain_controller_count: adConfig.domain_controller_count,
                        forest_type: adConfig.forest_type,
                        hybrid_mode: adConfig.hybrid_mode,
                        privileged_account_count: adConfig.privileged_account_count,
                        service_account_count: adConfig.service_account_count,
                        trust_relationships: adConfig.trust_relationships,
                        ad_security_tools: adConfig.ad_security_tools
                    } : null,
                    architecture_description: architectureDescription
                };

                localStorage.setItem('gp_environment', JSON.stringify(envData));
                
                setIsLoading(true);

                try {
                    const response = await fetch('http://localhost:8000/api/risk-profile', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            org_name: envData.org_name,
                            industry: envData.industry,
                            cloud_provider: envData.cloud_provider,
                            os_stack: envData.os_stack,
                            key_assets: envData.key_assets,
                            existing_security_tools: envData.existing_security_tools,
                            team_size: envData.team_size,
                            uses_active_directory: envData.uses_active_directory,
                            active_directory: envData.active_directory,
                            architecture_description: envData.architecture_description
                        })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('gp_risk_profile', JSON.stringify(data));
                    } else {
                        throw new Error('API failed');
                    }
                } catch (error) {
                    localStorage.setItem('gp_risk_profile', JSON.stringify({
                        risk_score: 70, 
                        risk_level: "HIGH", 
                        top_threats: [], 
                        recommended_scenario: "canary_aws_token", 
                        recommendation_reason: "", 
                        summary: ""
                    }));
                }

                window.location.href = 'index.html';
            };

            const inputClasses = "w-full bg-background border border-border rounded px-3 py-2 text-sm text-text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent";
            const selectClasses = "w-full bg-background border border-border rounded px-3 py-2 text-sm text-text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent appearance-none cursor-pointer";
            const labelClasses = "block text-xs font-semibold text-text-primary mb-1";
            const errorClasses = "text-danger text-xs mt-1";

            return (
                <div className="min-h-screen flex flex-col">
                    {/* TOP BAR */}
                    <div className="fixed top-0 w-full h-12 border-b border-border bg-surface-raised flex items-center justify-between px-4 z-50">
                        <div className="flex items-center space-x-3">
                            <svg className="w-4 h-4 text-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </svg>
                            <span className="text-[13px] font-semibold text-text-primary tracking-wide">GHOST PROTOCOL</span>
                            <div className="h-4 w-px bg-border"></div>
                            <span className="text-[12px] text-text-secondary tracking-wide">ENVIRONMENT SETUP</span>
                        </div>
                        <div className="font-mono text-[11px] text-text-muted">
                            Step 1 of 1
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="flex-1 flex flex-col items-center justify-center px-4 pt-16 pb-12">
                        <div className="w-full max-w-[640px]">
                            {/* Header section */}
                            <div className="mb-6">
                                <h1 className="text-2xl font-semibold text-text-primary mb-2 leading-none">Configure Your Environment</h1>
                                <p className="text-[14px] text-text-secondary leading-relaxed">
                                    Ghost Protocol uses your infrastructure details to generate personalised threat intelligence. This is stored locally and never leaves your browser.
                                </p>
                            </div>
                            
                            <hr className="border-border mb-6" />

                            {/* Form section */}
                            <form onSubmit={handleSubmit} className="bg-surface border border-border rounded-lg p-8">
                                <div className="space-y-5">
                                    {/* Row 1 */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className={labelClasses}>Organisation Name</label>
                                            <input 
                                                type="text" 
                                                className={inputClasses}
                                                placeholder="Acme Corp"
                                                value={orgName}
                                                onChange={(e) => setOrgName(e.target.value)}
                                            />
                                            {errors.orgName && <div className={errorClasses}>{errors.orgName}</div>}
                                        </div>
                                        <div>
                                            <label className={labelClasses}>Industry</label>
                                            <div className="relative">
                                                <select 
                                                    className={selectClasses}
                                                    value={industry}
                                                    onChange={(e) => setIndustry(e.target.value)}
                                                >
                                                    <option>Financial Services</option>
                                                    <option>Healthcare</option>
                                                    <option>Technology</option>
                                                    <option>Government</option>
                                                    <option>Retail</option>
                                                    <option>Manufacturing</option>
                                                    <option>Education</option>
                                                    <option>Other</option>
                                                </select>
                                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-text-secondary">
                                                    <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                                </div>
                                            </div>
                                            {errors.industry && <div className={errorClasses}>{errors.industry}</div>}
                                        </div>
                                    </div>

                                    {/* Row 2 */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className={labelClasses}>Cloud Provider</label>
                                            <div className="relative">
                                                <select 
                                                    className={selectClasses}
                                                    value={cloudProvider}
                                                    onChange={(e) => setCloudProvider(e.target.value)}
                                                >
                                                    <option>AWS</option>
                                                    <option>Azure</option>
                                                    <option>GCP</option>
                                                    <option>Multi-Cloud</option>
                                                    <option>On-Premise</option>
                                                    <option>Hybrid</option>
                                                </select>
                                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-text-secondary">
                                                    <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                                </div>
                                            </div>
                                            {errors.cloudProvider && <div className={errorClasses}>{errors.cloudProvider}</div>}
                                        </div>
                                        <div>
                                            <label className={labelClasses}>Team Size</label>
                                            <div className="relative">
                                                <select 
                                                    className={selectClasses}
                                                    value={teamSize}
                                                    onChange={(e) => setTeamSize(e.target.value)}
                                                >
                                                    <option>1-10</option>
                                                    <option>11-50</option>
                                                    <option>51-200</option>
                                                    <option>201-1000</option>
                                                    <option>1000+</option>
                                                </select>
                                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-text-secondary">
                                                    <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                                </div>
                                            </div>
                                            {errors.teamSize && <div className={errorClasses}>{errors.teamSize}</div>}
                                        </div>
                                    </div>

                                    {/* Row 3 */}
                                    <div>
                                        <label className={labelClasses}>Key Assets</label>
                                        <textarea 
                                            className={inputClasses}
                                            rows="3"
                                            placeholder="List your critical assets separated by commas. e.g. Production RDS us-east-1, S3 Data Lake, EC2 Fleet, Active Directory, Kubernetes Cluster"
                                            value={keyAssets}
                                            onChange={(e) => setKeyAssets(e.target.value)}
                                        ></textarea>
                                        {errors.keyAssets && <div className={errorClasses}>{errors.keyAssets}</div>}
                                    </div>

                                    {/* Row 4 */}
                                    <div>
                                        <label className={labelClasses}>OS &amp; Tech Stack</label>
                                        <input 
                                            type="text" 
                                            className={inputClasses}
                                            placeholder="e.g. Ubuntu 22.04, Windows Server 2019, Python 3.11, Node.js"
                                            value={osStack}
                                            onChange={(e) => setOsStack(e.target.value)}
                                        />
                                        {errors.osStack && <div className={errorClasses}>{errors.osStack}</div>}
                                    </div>

                                    {/* Row 5 */}
                                    <div>
                                        <label className={labelClasses}>Existing Security Tools</label>
                                        <input 
                                            type="text" 
                                            className={inputClasses}
                                            placeholder="e.g. CrowdStrike Falcon, Splunk SIEM, AWS GuardDuty, Palo Alto Firewall"
                                            value={securityTools}
                                            onChange={(e) => setSecurityTools(e.target.value)}
                                        />
                                        {errors.securityTools && <div className={errorClasses}>{errors.securityTools}</div>}
                                    </div>

                                    {/* Divider line */}
                                    <div className="flex items-center my-6">
                                        <div className="flex-1 h-px bg-border"></div>
                                        <span className="px-3 text-[11px] font-semibold text-text-muted tracking-wider uppercase whitespace-nowrap font-sans">INFRASTRUCTURE ARCHITECTURE</span>
                                        <div className="flex-1 h-px bg-border"></div>
                                    </div>

                                    {/* Active Directory Subsection */}
                                    <div className="space-y-4">
                                        <div className="flex items-center space-x-3 cursor-pointer select-none" onClick={() => setUseActiveDirectory(!useActiveDirectory)}>
                                            <div className={`w-4 h-4 flex items-center justify-center border rounded-sm transition-colors duration-150 ${useActiveDirectory ? 'bg-accent border-accent text-white' : 'bg-surface-raised border-border'}`}>
                                                {useActiveDirectory && <span className="text-[10px] leading-none">✓</span>}
                                            </div>
                                            <span className="text-[13px] font-sans text-text-primary">This environment uses Active Directory</span>
                                        </div>

                                        <div 
                                            className="transition-all duration-300 ease-in-out overflow-hidden"
                                            style={{ maxHeight: useActiveDirectory ? '1000px' : '0px' }}
                                        >
                                            <div className="bg-surface border border-border rounded-md p-5 mt-3 space-y-4">
                                                <div className="text-[11px] font-semibold text-text-muted tracking-wider uppercase font-sans">ACTIVE DIRECTORY CONFIGURATION</div>
                                                
                                                {/* Row 1 */}
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className={labelClasses}>Domain Name</label>
                                                        <input 
                                                            type="text"
                                                            className={inputClasses}
                                                            placeholder="corp.example.com"
                                                            value={adConfig.domain_name}
                                                            onChange={e => setAdConfig({...adConfig, domain_name: e.target.value})}
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className={labelClasses}>Forest Type</label>
                                                        <div className="relative">
                                                            <select 
                                                                className={selectClasses}
                                                                value={adConfig.forest_type}
                                                                onChange={e => setAdConfig({...adConfig, forest_type: e.target.value})}
                                                            >
                                                                <option value="">Select forest type...</option>
                                                                <option>Single Forest</option>
                                                                <option>Multi-Forest</option>
                                                                <option>Resource Forest</option>
                                                            </select>
                                                            <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-text-secondary">
                                                                <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Row 2 */}
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className={labelClasses}>Domain Controller Count</label>
                                                        <input 
                                                            type="number"
                                                            className={inputClasses}
                                                            placeholder="3"
                                                            value={adConfig.domain_controller_count}
                                                            onChange={e => setAdConfig({...adConfig, domain_controller_count: e.target.value})}
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className={labelClasses}>Hybrid Mode</label>
                                                        <div className="relative">
                                                            <select 
                                                                className={selectClasses}
                                                                value={adConfig.hybrid_mode}
                                                                onChange={e => setAdConfig({...adConfig, hybrid_mode: e.target.value})}
                                                            >
                                                                <option value="">Select hybrid mode...</option>
                                                                <option>Purely On-Premise</option>
                                                                <option>Hybrid (AD + Azure AD)</option>
                                                                <option>Hybrid (AD + Entra ID)</option>
                                                                <option>Cloud-Only (Azure AD)</option>
                                                            </select>
                                                            <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-text-secondary">
                                                                <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Row 3 */}
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className={labelClasses}>Privileged Account Count (Domain Admins)</label>
                                                        <input 
                                                            type="number"
                                                            className={inputClasses}
                                                            placeholder="5"
                                                            value={adConfig.privileged_account_count}
                                                            onChange={e => setAdConfig({...adConfig, privileged_account_count: e.target.value})}
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className={labelClasses}>Service Account Count</label>
                                                        <input 
                                                            type="number"
                                                            className={inputClasses}
                                                            placeholder="12"
                                                            value={adConfig.service_account_count}
                                                            onChange={e => setAdConfig({...adConfig, service_account_count: e.target.value})}
                                                        />
                                                    </div>
                                                </div>

                                                {/* Row 4 */}
                                                <div>
                                                    <label className={labelClasses}>Domain Trust Relationships</label>
                                                    <input 
                                                        type="text"
                                                        className={inputClasses}
                                                        placeholder="e.g. Two-way trust with partner.corp, one-way trust with legacy.local"
                                                        value={adConfig.trust_relationships}
                                                        onChange={e => setAdConfig({...adConfig, trust_relationships: e.target.value})}
                                                    />
                                                </div>

                                                {/* Row 5 */}
                                                <div>
                                                    <label className={labelClasses}>AD Security Tools</label>
                                                    <input 
                                                        type="text"
                                                        className={inputClasses}
                                                        placeholder="e.g. Microsoft Defender for Identity, BloodHound Enterprise, Varonis"
                                                        value={adConfig.ad_security_tools}
                                                        onChange={e => setAdConfig({...adConfig, ad_security_tools: e.target.value})}
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Architecture Description Subsection */}
                                    <div className="space-y-2 mt-6">
                                        <div className="flex justify-between items-center">
                                            <label className="text-[11px] font-semibold text-text-muted tracking-wider uppercase font-sans">ARCHITECTURE OVERVIEW</label>
                                            <span className="text-[10px] text-text-muted">(Optional)</span>
                                        </div>
                                        <textarea 
                                            rows="6"
                                            className="w-full bg-surface-raised border border-border rounded-sm px-3 py-2 text-sm text-text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent resize-y font-sans"
                                            placeholder="Describe your network architecture in plain English. Include anything Ghost Protocol should know — network segments, DMZ setup, VPN configuration, critical server locations, unusual trust relationships, legacy systems, or anything that makes your environment unique."
                                            value={architectureDescription}
                                            onChange={e => setArchitectureDescription(e.target.value)}
                                        ></textarea>
                                        <div className="text-[11px] text-text-muted font-sans">
                                            This free-text description is combined with your structured fields to give Ghost Protocol full context of your environment.
                                        </div>
                                    </div>

                                    {/* Submit Button */}
                                    <div className="pt-2">
                                        <button 
                                            type="submit"
                                            disabled={isLoading}
                                            className="w-full h-[44px] bg-accent hover:bg-accent-hover text-white font-semibold text-[13px] rounded transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            {isLoading ? "ANALYSING YOUR ENVIRONMENT..." : "INITIALISE GHOST PROTOCOL"}
                                        </button>
                                    </div>
                                    
                                    {/* Loading State */}
                                    {isLoading && (
                                        <div className="mt-4 flex flex-col items-center">
                                            <div className="w-full h-1 bg-surface-raised rounded-full overflow-hidden mb-2">
                                                <div 
                                                    className="h-full bg-accent transition-all ease-out" 
                                                    style={{ width: `${progress}%`, transitionDuration: '2s' }}
                                                ></div>
                                            </div>
                                            <span className="text-[12px] font-mono text-text-muted">
                                                Ghost Protocol is profiling your environment...
                                            </span>
                                        </div>
                                    )}
                                </div>
                            </form>

                            {/* Below Form Text */}
                            <div className="mt-4 text-center">
                                <span className="text-[11px] text-text-muted">
                                    Your data is stored locally in your browser. Ghost Protocol does not transmit your environment configuration to any server.
                                </span>
                            </div>
                        </div>
                    </div>

                    {/* BOTTOM BAR */}
                    <div className="fixed bottom-0 w-full h-8 border-t border-border bg-surface-raised flex items-center justify-between px-4 z-50">
                        <div className="font-mono text-[10px] text-text-muted">
                            GHOST PROTOCOL v3.0 // THREAT THEATRE
                        </div>
                        <div className="font-mono text-[10px] text-text-muted">
                            LOCAL STORAGE ONLY — NO DATA TRANSMITTED
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
